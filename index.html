<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Greco Pooles | Billar en Grecia</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
--rojo:#c1121f;
--negro:#0a0a0a;
--gris:#181818;
--blanco:#f4f4f4;
}

body{
margin:0;
font-family:'Roboto',sans-serif;
background:var(--negro);
color:var(--blanco);
}

/* MENU */

header{

position:fixed;
top:0;
width:100%;
background:#000;
padding:15px;
z-index:1000;
box-shadow:0 2px 10px rgba(0,0,0,.6);

}

nav{

display:flex;
justify-content:center;
gap:30px;

}

nav a{

color:white;
text-decoration:none;
font-weight:bold;
transition:.3s;

}

nav a:hover{

color:var(--rojo);

}

/* HERO */

.hero{

height:90vh;

background:
linear-gradient(rgba(0,0,0,.8),rgba(0,0,0,.8)),
url("salon_billar.png");

background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

}

/* LOGO BOLA 8 */

.logo{

width:140px;
height:140px;
background:black;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
font-weight:bold;
border:6px solid white;
margin-bottom:20px;

}

.hero h1{

font-family:'Oswald',sans-serif;
font-size:45px;
color:var(--rojo);

}

.btn{

background:var(--rojo);
padding:14px 35px;
border-radius:6px;
text-decoration:none;
color:white;
font-weight:bold;
margin-top:15px;

}

/* SECCIONES */

.section{

padding:80px 20px;
max-width:1000px;
margin:auto;
text-align:center;

}

/* PRECIOS */

.prices{

display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;

}

.price-card{

background:var(--gris);
padding:25px;
border-radius:10px;
width:200px;
border:2px solid var(--rojo);

}

/* GALERIA */

.gallery{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:10px;

}

.gallery img{

width:100%;
height:200px;
object-fit:cover;
border-radius:8px;
cursor:pointer;

}

/* LIGHTBOX */

#lightbox{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:none;
align-items:center;
justify-content:center;

}

#lightbox img{

max-width:90%;
max-height:80%;

}

/* MAPA */

.map{

margin-top:30px;

}

/* WHATSAPP */

.whatsapp{

position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:white;
text-decoration:none;

}

/* ANIMACION */

.fade{

opacity:0;
transform:translateY(30px);
transition:all .8s ease;

}

.fade.visible{

opacity:1;
transform:translateY(0);

}

footer{

text-align:center;
padding:40px;
color:#777;

}

</style>

</head>

<body>

<header>

<nav>

<a href="#inicio">Inicio</a>
<a href="#precios">Precios</a>
<a href="#galeria">Galería</a>
<a href="#mapa">Cómo llegar</a>

</nav>

</header>

<section class="hero" id="inicio">

<div class="logo">8</div>

<h1>Greco Pooles</h1>

<p>Billar, snacks y el mejor ambiente</p>

<a href="https://wa.me/50689718066?text=Hola%20quiero%20reservar%20una%20mesa%20de%20pool" class="btn">

Reservar por WhatsApp

</a>

</section>

<section class="section fade" id="precios">

<h2>Precios del Pool</h2>

<div class="prices">

<div class="price-card">

<h3>Media Hora</h3>
<p>₡1500</p>

</div>

<div class="price-card">

<h3>1 Hora</h3>
<p>₡2500</p>

</div>

</div>

</section>

<section class="section fade" id="galeria">

<h2>Galería</h2>

<div class="gallery">

<img src="bola_blanca.png">
<img src="detalle_mesa.png">
<img src="salon_billar.png">
<img src="maquinitas.png">

</div>

</section>

<section class="section fade" id="mapa">

<h2>Cómo llegar</h2>

<p>Estamos ubicados en Grecia, Alajuela.</p>

<div class="map">

<iframe
width="100%"
height="300"
style="border:0"
loading="lazy"
allowfullscreen
src="https://www.google.com/maps?q=Grecia+Alajuela+Costa+Rica&output=embed">
</iframe>

</div>

</section>

<footer>

<p>© 2026 Greco Pooles</p>

</footer>

<a href="https://wa.me/50689718066?text=Hola%20quiero%20reservar%20una%20mesa%20de%20pool" class="whatsapp">

💬

</a>

<div id="lightbox">

<img id="lightbox-img">

</div>

<script>

/* GALERIA */

const images=document.querySelectorAll(".gallery img")
const lightbox=document.getElementById("lightbox")
const lightboxImg=document.getElementById("lightbox-img")

images.forEach(img=>{

img.onclick=()=>{

lightbox.style.display="flex"
lightboxImg.src=img.src

}

})

lightbox.onclick=()=>{

lightbox.style.display="none"

}

/* SCROLL */

const faders=document.querySelectorAll(".fade")

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.classList.add("visible")

}

})

})

faders.forEach(el=>observer.observe(el))

</script>

</body>
</html>
