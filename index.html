<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Greco Pooles | Sala de Pool en Grecia</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0b3d2e;
color:white;
}

/* HEADER */

header{
background:#071f18;
padding:20px;
position:sticky;
top:0;
z-index:1000;
}

nav{
display:flex;
justify-content:center;
gap:25px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* HERO */

.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1511882150382-421056c89033");

background-size:cover;
background-position:center;
}

.hero h1{
font-size:45px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
background:#1db954;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

/* SECTIONS */

.section{
padding:70px 20px;
max-width:1000px;
margin:auto;
text-align:center;
}

/* PRECIOS */

.prices{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-top:30px;
}

.price-box{
background:#123f30;
padding:30px;
border-radius:10px;
width:220px;
transition:transform .3s;
}

.price-box:hover{
transform:scale(1.05);
}

/* GALERIA */

.gallery{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:8px;
}

/* CONTACTO */

.contact{
background:#071f18;
padding:50px;
text-align:center;
}

/* FOOTER */

footer{
background:black;
padding:15px;
text-align:center;
font-size:14px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:white;
text-decoration:none;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* ANIMACIONES */

.fade{
opacity:0;
transform:translateY(30px);
transition:all .8s ease;
}

.fade.visible{
opacity:1;
transform:translateY(0);
}

</style>

</head>

<body>

<header>

<nav>

<a href="#inicio">Inicio</a>
<a href="#precios">Precios</a>
<a href="#galeria">Galería</a>
<a href="#contacto">Contacto</a>

</nav>

</header>


<section class="hero" id="inicio">

<h1>Greco Pooles</h1>

<p>Sala de Pool en Grecia</p>

<button onclick="location.href='#precios'">

Ver precios

</button>

</section>


<section class="section fade" id="precios">

<h2>Precios</h2>

<div class="prices">

<div class="price-box fade">

<h3>Media hora</h3>

<p>₡1500</p>

</div>

<div class="price-box fade">

<h3>1 Hora</h3>

<p>₡2500</p>

</div>

</div>

</section>


<section class="section fade" id="galeria">

<h2>Galería</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1605727216801-e27ce1d0cc28">

<img src="https://images.unsplash.com/photo-1511882150382-421056c89033">

<img src="https://images.unsplash.com/photo-1586816001966-79b736744398">

</div>

</section>


<section class="contact fade" id="contacto">

<h2>Contacto</h2>

<p>Teléfono / WhatsApp</p>

<p><strong>+506 8971 8066</strong></p>

<p>Grecia, Alajuela, Costa Rica</p>

</section>


<footer>

© 2026 Greco Pooles

</footer>


<a href="https://wa.me/50689718066" class="whatsapp" target="_blank">

💬

</a>


<script>

const faders=document.querySelectorAll(".fade");

const appear=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.classList.add("visible");

}

});

});

faders.forEach(el=>{

appear.observe(el);

});

</script>


</body>

</html>
